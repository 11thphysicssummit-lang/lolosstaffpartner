      margin: 0;
      padding: 0;
      font-family: 'Poppins', Arial, sans-serif;
    }

      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 204, 112, 0.45), transparent 26%),
        radial-gradient(circle at 85% 12%, rgba(122, 167, 255, 0.55), transparent 28%),
        radial-gradient(circle at 78% 88%, rgba(37, 211, 102, 0.22), transparent 26%),
        linear-gradient(135deg, #f7fbff, #eaf3ff, #dcecff);
      color: #1f2a44;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(8px);
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
      animation: floatBlob 8s ease-in-out infinite;
    }

    body::before {
      left: -130px;
      top: 80px;
      background: radial-gradient(circle, rgba(255, 129, 119, 0.35), transparent 68%);
    }

    body::after {
      right: -120px;
      bottom: 70px;
      background: radial-gradient(circle, rgba(49, 76, 150, 0.28), transparent 68%);
      animation-delay: -3s;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(49, 76, 150, 0.16);
      border-radius: 32px;
      padding: 38px;
      box-shadow:
        0 24px 70px rgba(49, 76, 150, 0.16),
        inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
      backdrop-filter: blur(14px);
    }

    .container::before {
      content: "";
      position: absolute;
      inset: -2px;
      background:
        linear-gradient(90deg, transparent, rgba(122, 167, 255, 0.35), transparent),
        linear-gradient(180deg, rgba(255, 204, 112, 0.18), transparent 38%);
      opacity: 0.7;
      z-index: -1;
      animation: shimmer 4s linear infinite;
    }

    .container::after {
      content: "✦";
      position: absolute;
      top: 22px;
      right: 28px;
      color: #ff8177;
      font-size: 26px;
      animation: twinkle 1.8s ease-in-out infinite;
    }

    .logo {
      width: 120px;
      max-width: 100%;
      margin: 0 auto 16px;
      display: block;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #314c96;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.05;
      margin-bottom: 14px;
      color: #16213e;
    }

    .subtitle {
      color: #4b5b7c;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #c8d8f5;
      outline: none;
      font-size: 16px;
      background: white;
      color: #08111f;
    }

    input:focus {
      border-color: #314c96;
      box-shadow: 0 0 0 4px rgba(49, 76, 150, 0.12);
    }

    .search-box input {
      flex: 1;
    }

    button, .button-link {
      padding: 16px 22px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffcc70, #ff8177);
      color: #111827;
      font-weight: 800;
      font-size: 15px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    button:hover, .button-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 129, 119, 0.22);
    }

    .button-gform {
      background: linear-gradient(135deg, #314c96, #7aa7ff);

      margin-top: 16px;
    }

    .button-wa {
      background: linear-gradient(135deg, #6d5dfc, #8fb3ff);
      color: white;
      margin-top: 12px;
    }

    .button-back {
      background: #e8f0ff;
      color: #314c96;
      margin-top: 12px;
    }

    .result {

      padding: 28px;
      border-radius: 24px;
      animation: fadeIn 0.35s ease;
      text-align: center;
    }

    .pass {
      background: linear-gradient(135deg, #ecfff3, #eef8ff);
      border: 1px solid #a7f3d0;
    }

    .process {
      background: linear-gradient(135deg, #fffbea, #eff6ff);
      border: 1px solid #fde68a;
    }

    .fail {
      background: linear-gradient(135deg, #fff1f2, #fff8e8);
      border: 1px solid #fecaca;
    }

    .unknown {
      background: #f8fbff;
      border: 1px solid #dbe8ff;
    }

    .icon {
      font-size: 54px;
      margin-bottom: 12px;
    }

      font-size: 28px;
      margin-bottom: 10px;

    .result p {

      font-size: 20px;
      font-weight: 800;

      height: 10px;

      box-shadow: 0 0 18px rgba(255, 204, 112, 0.9);

      bottom: 24px;
      width: 90px;
      height: 74px;

      border-top: none;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 0 20px rgba(122, 167, 255, 0.45);
      opacity: 0.45;
      animation: houseGlow 2.8s ease-in-out infinite;
    }

    .neon-house::before {
      content: "";
      position: absolute;
      width: 64px;
      height: 64px;
      left: 10px;
      top: -34px;
      border-left: 3px solid rgba(255, 129, 119, 0.6);
      border-top: 3px solid rgba(255, 129, 119, 0.6);
      transform: rotate(45deg);
      border-radius: 10px 0 0 0;
    }

    .neon-house::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 30px;
      left: 34px;
      bottom: 0;
      border-radius: 8px 8px 0 0;
      background: rgba(255, 204, 112, 0.45);
      box-shadow: 0 0 16px rgba(255, 204, 112, 0.9);
    }

    .sparkle {
      position: absolute;
      color: #314c96;
      opacity: 0.4;
      animation: twinkle 2.2s ease-in-out infinite;
      font-weight: 900;
    }

    .sparkle.s1 { left: 24%; top: 28px; animation-delay: -0.4s; }
    .sparkle.s2 { right: 23%; top: 135px; animation-delay: -1.2s; }
    .sparkle.s3 { right: 12%; bottom: 75px; animation-delay: -0.9s; }

      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(22px, -26px) scale(1.07); }
    }

    @keyframes shimmer {
      0% { transform: translateX(-20%); }
      100% { transform: translateX(20%); }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.35; }
      50% { transform: scale(1.25) rotate(12deg); opacity: 0.9; }
    }

    @keyframes orbit {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(16px, -18px); }
    }

    @keyframes houseGlow {
      0%, 100% { opacity: 0.35; transform: translateY(0); }
      50% { opacity: 0.6; transform: translateY(-4px); }
    }

    .hide {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 26px 20px;
      }

      .search-box {
        flex-direction: column;
      }

      button, .button-link {
        width: 100%;
      }

      .logo {
        width: 96px;
      }
    }

            Halo <b>${pesertaProses[nrp]}</b>, data NRP kamu sudah terdaftar,
            tetapi hasil seleksi Staff Partner Physics Summit kamu masih dalam proses.
          </p>
          <div class="name">${pesertaProses[nrp]}<br>${nrp}</div>
          <p style="margin-top: 16px;">
            Silakan menunggu informasi selanjutnya dari panitia. Jika ada pertanyaan,
            kamu dapat menghubungi contact person di bawah.
          </p>
          <div class="cp-row">
            <a class="button-link button-wa" href="${buatLinkWA(nomorCPSalwa, nama, nrp)}"ma belum terdata', nrp)}"ertaTidakLolosBerkas[nrp], nrp)}"ertaProses[nrp], nrp)}" target="_blank">
              Tanya CP Salwa
            </a>
            <a class="button-link button-wa" href="${buatLinkWA(nomorCPZain, nama, nrp)}"ma belum terdata', nrp)}"ertaTidakLolosBerkas[nrp], nrp)}"ertaProses[nrp], nrp)}" target="_blank">
              Tanya CP Zain
            </a>
          </div>
          <br />
          <a class="button-link button-back" href="./">
            Cek NRP Lain
          </a>
        `;
      } else if (pesertaTidakLolosBerkas[nrp]) {
        result.className = "result fail";
        result.innerHTML = `
          <div class="icon">🙏</div>
          <h2>Terima Kasih Sudah Berpartisipasi</h2>
          <p>
            Mohon maaf, <b>NRP tersebut sudah tidak lolos dari seleksi berkas</b>
            Staff Partner Physics Summit.
          </p>
          <div class="name">${pesertaTidakLolosBerkas[nrp]}<br>${nrp}</div>
          <p style="margin-top: 16px;">
            Terima kasih atas antusiasme dan partisipasinya. Tetap semangat dan sampai bertemu di kesempatan berikutnya!
          </p>
          <div class="cp-row">
            <a class="button-link button-wa" href="https://wa.me/${nomorCPSalwa}" target="_blank">
              Tanya CP Salwa
            </a>
            <a class="button-link button-wa" href="https://wa.me/${nomorCPZain}" target="_blank">
              Tanya CP Zain
            </a>
          </div>
          <br />
          <a class="button-link button-back" href="./">
            Cek NRP Lain
          </a>
        `;
      } else {
        result.className = "result unknown";
        result.innerHTML = `
          <div class="icon">⚠️</div>
          <h2>NRP Tidak Ditemukan</h2>
          <p>
            NRP yang kamu masukkan belum terdaftar dalam database pengumuman.
            Pastikan NRP sudah benar atau hubungi CP Salwa jika ada kendala.
          </p>
          <div class="cp-row">
            <a class="button-link button-wa" href="https://wa.me/${nomorCPSalwa}" target="_blank">
              Tanya CP Salwa
            </a>
            <a class="button-link button-wa" href="https://wa.me/${nomorCPZain}" target="_blank">
              Tanya CP Zain
            </a>
          </div>
          <br />
          <a class="button-link button-back" href="./">
            Cek NRP Lain
          </a>
        `;
      }
    }

    function tampilkanLolos(nrp, nama) {
      const result = document.getElementById("result");
      const stikerRandom = ambilStikerRandom();

      result.className = "result pass";
      result.innerHTML = `
        <div class="icon">🎉</div>
        <h2>Selamat, Kamu Lolos!</h2>
        <p>
          Selamat kepada kamu karena telah dinyatakan <b>LOLOS</b>
          sebagai Staff Partner Physics Summit.
        </p>
        <div class="name">${nama}<br>${nrp}</div>

        <img src="${stikerRandom}" alt="Sticker Lolos" class="sticker-lolos" />

        <div class="info-box">
          <p><b>Kepo ya kamu masuk divisi apa?</b> Sabar dulu yaa 😼</p>
          <ul class="info-list">
            <li>Informasi pembagian divisi akan diumumkan saat <b>Welcome Party</b>.</li>
            <li>Welcome Party dilaksanakan pada <b>tanggal 6</b>.</li>
            <li>Jangan lupa hadir ya!</li>
          </ul>
        </div>

        <div class="info-box next-step">
          <p><b>Langkah selanjutnya:</b></p>
          <ul class="info-list">
            <li>Isi Google Form pendataan melalui tombol di bawah.</li>
            <li>Deadline pengisian pendataan adalah <b>tanggal 3</b>.</li>
            <li>Setelah submit Google Form, akan ada link grup WhatsApp Staff Partner di bagian akhir form.</li>
            <li>Link grup <b>jangan disebarkan</b>.</li>
            <li>Setelah mendapatkan link, silakan langsung masuk ke grup ya.</li>
          </ul>
        </div>

        <a class="button-link button-gform" href="${linkGFormPendataan}" target="_blank">
          Isi Pendataan IKOMA
        </a>

        <br />

        <div class="cp-row">
          <a class="button-link button-wa" href="https://wa.me/${nomorCPSalwa}" target="_blank">
            Tanya CP Salwa
          </a>
          <a class="button-link button-wa" href="https://wa.me/${nomorCPZain}" target="_blank">
            Tanya CP Zain
          </a>
        </div>

        <br />

        <a class="button-link button-back" href="./">
          Cek NRP Lain
        </a>
      `;
    }

    document.getElementById("nrpInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        bukaHalamanHasil();
      }
    });

    tampilkanHalamanHasil();
  </script>
</body>
