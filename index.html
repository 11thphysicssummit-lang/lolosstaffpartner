      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 204, 112, 0.45), transparent 26%),
        radial-gradient(circle at 86% 14%, rgba(122, 167, 255, 0.55), transparent 28%),
        radial-gradient(circle at 80% 88%, rgba(109, 93, 252, 0.22), transparent 28%),
        linear-gradient(135deg, #fffaf0, #eef6ff, #dbfff6);
      color: #17223f;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 999px;
      filter: blur(8px);
      opacity: 0.55;
      z-index: 0;
      pointer-events: none;
      animation: floatBlob 8s ease-in-out infinite;
    }

    body::before {
      left: -130px;
      top: 80px;
      background: radial-gradient(circle, rgba(255, 129, 119, 0.35), transparent 68%);
    }

    body::after {
      right: -120px;
      bottom: 70px;
      background: radial-gradient(circle, rgba(49, 76, 150, 0.28), transparent 68%);
      animation-delay: -3s;
    }

    .container {
      width: 100%;
      max-width: 860px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(49, 76, 150, 0.16);
      border-radius: 34px;
      padding: 40px;
      box-shadow:
        0 26px 80px rgba(49, 76, 150, 0.18),
        inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
      backdrop-filter: blur(14px);
    }

    .decorations {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .orb {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #7aa7ff;
      box-shadow: 0 0 18px rgba(122, 167, 255, 0.9);
      animation: orbit 6s ease-in-out infinite;
      opacity: 0.85;
    }

    .orb.one { top: 105px; left: 48px; }
    .orb.two {
      top: 68px;
      right: 105px;
      width: 9px;
      height: 9px;
      background: #ff8177;
      box-shadow: 0 0 18px rgba(255, 129, 119, 0.9);
      animation-delay: -2s;
    }
    .orb.three {
      bottom: 110px;
      right: 52px;
      width: 10px;
      height: 10px;
      background: #ffcc70;
      box-shadow: 0 0 18px rgba(255, 204, 112, 0.9);
      animation-delay: -4s;
    }

    .sparkle {
      position: absolute;
      color: #314c96;
      opacity: 0.4;
      animation: twinkle 2.2s ease-in-out infinite;
      font-weight: 900;
      font-size: 24px;
    }

    .sparkle.s1 { left: 24%; top: 28px; animation-delay: -0.4s; }
    .sparkle.s2 { right: 23%; top: 135px; animation-delay: -1.2s; }
    .sparkle.s3 { right: 12%; bottom: 75px; animation-delay: -0.9s; }

    .neon-house {
      position: absolute;
      left: 26px;
      bottom: 24px;
      width: 90px;
      height: 74px;
      border: 3px solid rgba(49, 76, 150, 0.45);
      border-top: none;
      border-radius: 0 0 16px 16px;
      box-shadow: 0 0 20px rgba(122, 167, 255, 0.35);
      opacity: 0.45;
      animation: houseGlow 2.8s ease-in-out infinite;
    }

    .neon-house::before {
      content: "";
      position: absolute;
      width: 64px;
      height: 64px;
      left: 10px;
      top: -34px;
      border-left: 3px solid rgba(255, 129, 119, 0.55);
      border-top: 3px solid rgba(255, 129, 119, 0.55);
      transform: rotate(45deg);
      border-radius: 10px 0 0 0;
    }

    .neon-house::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 30px;
      left: 34px;
      bottom: 0;
      border-radius: 8px 8px 0 0;
      background: rgba(255, 204, 112, 0.45);
      box-shadow: 0 0 16px rgba(255, 204, 112, 0.9);
    }

    .logo {
      width: 130px;
      max-width: 100%;
      margin: 0 auto 16px;
      display: block;
    }

    .badge {
      display: inline-block;
      padding: 9px 18px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #314c96;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 18px;
      box-shadow: 0 8px 22px rgba(49, 76, 150, 0.08);
    }

    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(42px, 7vw, 70px);
      line-height: 1.03;
      margin-bottom: 14px;
      color: #16213e;
      font-weight: 950;
      letter-spacing: -1.8px;
      text-shadow: 0 4px 18px rgba(49, 76, 150, 0.12);
    }

    .subtitle {
      color: #4b5b7c;
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin: 0 auto 12px;
      max-width: 720px;
    }

    input, textarea {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #c8d8f5;
      outline: none;
      font-size: 16px;
      background: white;
      color: #08111f;
    }

    input:focus, textarea:focus {
      border-color: #314c96;
      box-shadow: 0 0 0 4px rgba(49, 76, 150, 0.12);
    }

    .search-box input { flex: 1; }

    button, .button-link {
      padding: 16px 22px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffcc70, #ff8177);
      color: #111827;
      font-weight: 900;
      font-size: 15px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    button:hover, .button-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 129, 119, 0.22);
    }

    .button-gform {
      background: linear-gradient(135deg, #314c96, #7aa7ff);
      color: white;
      margin-top: 16px;
    }

    .button-wa {
      background: linear-gradient(135deg, #6d5dfc, #8fb3ff);
      color: white;
      margin-top: 12px;
    }

    .button-back {
      background: #e8f0ff;
      color: #314c96;
      margin-top: 18px;
    }

    .result {
      margin-top: 12px;
      padding: 30px;
      border-radius: 26px;
      animation: fadeIn 0.35s ease;
      text-align: center;
    }

    .pass {
      background: linear-gradient(135deg, #ecfff3, #eef8ff);
      border: 1px solid #a7f3d0;
    }

    .process {
      background: linear-gradient(135deg, #fffbea, #eff6ff);
      border: 1px solid #fde68a;
    }

    .fail {
      background: linear-gradient(135deg, #fff1f2, #fff8e8);
      border: 1px solid #fecaca;
    }

    .unknown {
      background: #f8fbff;
      border: 1px solid #dbe8ff;
    }

    .icon {
      font-size: 54px;
      margin-bottom: 12px;
    }

    .result h2 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 34px;
      margin-bottom: 10px;
      color: #16213e;
      font-weight: 950;
      letter-spacing: -0.9px;
    }

    .result p {
      color: #334155;
      line-height: 1.75;
      font-size: 17px;
    }

    .name {
      margin-top: 14px;
      font-size: 23px;
      font-weight: 950;
      color: #314c96;
      letter-spacing: -0.3px;
    }

    .sticker-lolos {
      width: min(280px, 100%);
      display: block;
      margin: 20px auto 10px;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .info-box {
      margin-top: 20px;
      padding: 20px;
      border-radius: 20px;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
      text-align: left;
    }

    .division-teaser {
      font-size: 18px;
      line-height: 1.85;
      color: #334155;
      text-align: center;
      margin: 0;
    }

    .division-teaser b {
      color: #314c96;
      font-weight: 950;
    }

    .next-step { background: #f4f8ff; }

    .next-step p {
      text-align: center;
      font-weight: 950;
      color: #17223f;
      margin-bottom: 10px;
    }

    .info-list {
      margin: 0;
      padding-left: 22px;
      color: #334155;
      line-height: 1.8;
      font-size: 16px;
    }

    .info-list li { margin-bottom: 6px; }

    .cp-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .hide { display: none; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 99;
      backdrop-filter: blur(6px);
    }

    .modal-overlay.show { display: flex; }

    .modal-card {
      width: min(720px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #dbe8ff;
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 30px 90px rgba(15, 23, 42, 0.26);
      text-align: left;
      animation: popModal 0.25s ease;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .modal-header h2 {
      font-size: 32px;
      color: #16213e;
      margin: 0;
      font-weight: 950;
    }

    .modal-close {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: none;
      background: #eef4ff;
      color: #16213e;
      font-size: 28px;
      line-height: 1;
      padding: 0;
      box-shadow: none;
    }

    .modal-desc {
      color: #5b6b88;
      line-height: 1.7;
      margin-bottom: 20px;
      font-size: 16px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .modal-field { margin-bottom: 14px; }

    .modal-field label {
      display: block;
      margin-bottom: 8px;
      color: #16213e;
      font-weight: 900;
    }

    .modal-field textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .button-send {
      background: linear-gradient(135deg, #26c6ff, #6d5dfc, #ec4bc4);
      color: white;
    }

    .button-cancel {
      background: #f3f6ff;
      color: #314c96;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(22px, -26px) scale(1.07); }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.35; }
      50% { transform: scale(1.25) rotate(12deg); opacity: 0.9; }
    }

    @keyframes orbit {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(16px, -18px); }
    }

    @keyframes houseGlow {
      0%, 100% { opacity: 0.35; transform: translateY(0); }
      50% { opacity: 0.6; transform: translateY(-4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popModal {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .container { padding: 28px 20px; border-radius: 26px; }
      .search-box { flex-direction: column; }
      button, .button-link { width: 100%; }
      .logo { width: 105px; }
      .modal-grid { grid-template-columns: 1fr; }
      .modal-card { padding: 22px; border-radius: 22px; }
      .modal-header h2 { font-size: 26px; }
      h1 { font-size: 42px; }
    }
  </style>
</head>

    let pesertaAktif = { nama: "", nrp: "" };
    let kontakAktif = { namaCP: "", nomorCP: "" };

    function escapeHTML(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function ambilStikerRandom() {
      const indexAcak = Math.floor(Math.random() * daftarStikerLolos.length);
      return encodeURI(daftarStikerLolos[indexAcak]);
    }

    function bukaHalamanHasil() {
      const nrp = document.getElementById("nrpInput").value.trim();

      if (!nrp) {
        alert("Silakan masukkan NRP terlebih dahulu.");
        return;
      }

      window.location.href = `?nrp=${encodeURIComponent(nrp)}`;
    }

    function tampilkanHalamanHasil() {
      const params = new URLSearchParams(window.location.search);
      const nrp = params.get("nrp");

      if (!nrp) {
        document.getElementById("homePage").classList.remove("hide");
        document.getElementById("resultPage").classList.add("hide");
        return;
      }

      document.getElementById("homePage").classList.add("hide");
      document.getElementById("resultPage").classList.remove("hide");
      cekHasil(nrp.trim());
    }

    function cekHasil(nrp) {
      if (pesertaLolos[nrp]) {
        pesertaAktif = { nama: pesertaLolos[nrp], nrp };
        tampilkanLolos(nrp, pesertaLolos[nrp]);
      } else if (pesertaProses[nrp]) {
        pesertaAktif = { nama: pesertaProses[nrp], nrp };
        tampilkanProses(nrp, pesertaProses[nrp]);
      } else if (pesertaTidakLolosBerkas[nrp]) {
        pesertaAktif = { nama: pesertaTidakLolosBerkas[nrp], nrp };
        tampilkanTidakLolosBerkas(nrp, pesertaTidakLolosBerkas[nrp]);
      } else {
        pesertaAktif = { nama: "Nama belum terdata", nrp };
        tampilkanTidakDitemukan(nrp);
      }
    }

    function tombolCP() {
      return `
        <div class="cp-row">
          <button type="button" class="button-link button-wa" onclick="bukaModalKontak('Salwa')">Tanya CP Salwa</button>
          <button type="button" class="button-link button-wa" onclick="bukaModalKontak('Zain')">Tanya CP Zain</button>
        </div>
      `;
    }

    function tombolKembali() {
      return `<br /><a class="button-link button-back" href="./">Cek NRP Lain</a>`;
    }

    function tampilkanLolos(nrp, nama) {
      const result = document.getElementById("result");
      const stikerRandom = ambilStikerRandom();

      result.className = "result pass";
      result.innerHTML = `
        <div class="icon">🎉</div>
        <h2>Selamat, Kamu Lolos!</h2>
        <p>
          Selamat kepada kamu karena telah dinyatakan <b>LOLOS</b>
          sebagai Staff Partner 11th Physics Summit.
        </p>
        <div class="name">${escapeHTML(nama)}<br>${escapeHTML(nrp)}</div>

        <img src="${stikerRandom}" alt="Sticker Lolos" class="sticker-lolos" />

        <div class="info-box">
          <p class="division-teaser">
            <b>Kepo ya kamu masuk divisi apa?</b> Sabar dulu yaa 😼<br />
            Informasi pembagian divisi akan diumumkan saat <b>Welcome Party</b>
            pada <b>tanggal 6</b>. Jadi, jangan lupa hadir ya!
          </p>
        </div>

        <div class="info-box next-step">
          <p>Langkah selanjutnya:</p>
          <ul class="info-list">
            <li>Isi pendataan IKOMA melalui tombol di bawah.</li>
            <li><b>Catatan:</b> form ini hanya untuk pendataan.</li>
            <li>Deadline pengisian pendataan adalah <b>tanggal 3</b>.</li>
            <li>Setelah submit, akan ada link grup WhatsApp Staff Partner di bagian akhir form.</li>
            <li>Link grup <b>jangan disebarkan</b>.</li>
            <li>Setelah mendapatkan link, silakan langsung masuk ke grup ya.</li>
          </ul>
        </div>

        <a class="button-link button-gform" href="${linkGFormPendataan}" target="_blank">
          Isi Pendataan IKOMA
        </a>

        ${tombolCP()}
        ${tombolKembali()}
      `;
    }

    function tampilkanProses(nrp, nama) {
      const result = document.getElementById("result");
      result.className = "result process";
      result.innerHTML = `
        <div class="icon">⏳</div>
        <h2>Hasil Kamu Masih Dalam Proses</h2>
        <p>
          Halo <b>${escapeHTML(nama)}</b>, data NRP kamu sudah terdaftar,
          tetapi hasil seleksi Staff Partner 11th Physics Summit kamu masih dalam proses.
        </p>
        <div class="name">${escapeHTML(nama)}<br>${escapeHTML(nrp)}</div>
        <p style="margin-top: 16px;">
          Silakan menunggu informasi selanjutnya dari panitia. Jika ada pertanyaan,
          kamu dapat menghubungi contact person di bawah.
        </p>
        ${tombolCP()}
        ${tombolKembali()}
      `;
    }

    function tampilkanTidakLolosBerkas(nrp, nama) {
      const result = document.getElementById("result");
      result.className = "result fail";
      result.innerHTML = `
        <div class="icon">🙏</div>
        <h2>Terima Kasih Sudah Berpartisipasi</h2>
        <p>
          Mohon maaf, <b>NRP tersebut sudah tidak lolos dari seleksi berkas</b>
          Staff Partner 11th Physics Summit.
        </p>
        <div class="name">${escapeHTML(nama)}<br>${escapeHTML(nrp)}</div>
        <p style="margin-top: 16px;">
          Terima kasih atas antusiasme dan partisipasinya. Tetap semangat dan sampai bertemu di kesempatan berikutnya!
        </p>
        ${tombolCP()}
        ${tombolKembali()}
      `;
    }

    function tampilkanTidakDitemukan(nrp) {
      const result = document.getElementById("result");
      result.className = "result unknown";
      result.innerHTML = `
        <div class="icon">⚠️</div>
        <h2>NRP Tidak Ditemukan</h2>
        <p>
          NRP yang kamu masukkan belum terdaftar dalam database pengumuman.
          Pastikan NRP sudah benar atau hubungi contact person jika ada kendala.
        </p>
        <div class="name">${escapeHTML(nrp)}</div>
        ${tombolCP()}
        ${tombolKembali()}
      `;
    }

    function bukaModalKontak(namaCP) {
      kontakAktif.namaCP = namaCP;
      kontakAktif.nomorCP = namaCP === "Salwa" ? nomorCPSalwa : nomorCPZain;

      document.getElementById("modalNama").value = pesertaAktif.nama || "";
      document.getElementById("modalNrp").value = pesertaAktif.nrp || "";
      document.getElementById("modalTujuan").value = `${namaCP} (Contact Person)`;
      document.getElementById("modalPesan").value = "";
      document.getElementById("contactModal").classList.add("show");
    }

    function tutupModalKontak() {
      document.getElementById("contactModal").classList.remove("show");
    }

    function kirimPesanKontak() {
      const nama = document.getElementById("modalNama").value.trim();
      const nrp = document.getElementById("modalNrp").value.trim();
      const pesanTambahan = document.getElementById("modalPesan").value.trim();

      if (!nama || !nrp || !pesanTambahan) {
        alert("Nama, NRP, dan pesan wajib diisi terlebih dahulu ya.");
        return;
      }

      const pesan = encodeURIComponent(
        `Halo Kak ${kontakAktif.namaCP}, saya ingin bertanya terkait Staff Partner 11th Physics Summit.\n\nNama: ${nama}\nNRP: ${nrp}\nPesan: ${pesanTambahan}`
      );

      window.open(`https://wa.me/${kontakAktif.nomorCP}?text=${pesan}`, "_blank");
      tutupModalKontak();
    }

    document.getElementById("cekButton").addEventListener("click", bukaHalamanHasil);
    document.getElementById("nrpInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") bukaHalamanHasil();
    });

    tampilkanHalamanHasil();
  </script>
