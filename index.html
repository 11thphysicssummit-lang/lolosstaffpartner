<html lang="id">

  <title>Pengumuman Staff Partner Physics Summit</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f7fbff, #eaf3ff, #dcecff);
      color: #1f2a44;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(49, 76, 150, 0.12);
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(49, 76, 150, 0.12);
      text-align: center;
    }

    .logo {
      width: 120px;
      max-width: 100%;
      margin: 0 auto 16px;
      display: block;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #314c96;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.05;
      margin-bottom: 14px;
      color: #16213e;
    }

    .subtitle {
      color: #4b5b7c;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input, select {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #c8d8f5;
      outline: none;
      font-size: 16px;
      background: white;
      color: #08111f;
    }

    input:focus, select:focus {
      border-color: #314c96;
      box-shadow: 0 0 0 4px rgba(49, 76, 150, 0.12);
    }

    .search-box input {
      flex: 1;
    }

    button, .wa-button {
      padding: 16px 22px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffcc70, #ff8177);
      color: #111827;
      font-weight: 800;
      font-size: 15px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    button:hover, .wa-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 129, 119, 0.22);
    }

    .wa-button {
      background: linear-gradient(135deg, #25d366, #9cffb5);
      margin-top: 16px;
    }

    .result {
      display: none;
      margin-top: 24px;
      padding: 28px;
      border-radius: 24px;
      animation: fadeIn 0.35s ease;
      text-align: center;
    }

    .result.pass {
      display: block;
      background: linear-gradient(135deg, #ecfff3, #eef8ff);
      border: 1px solid #a7f3d0;
    }

    .result.process {
      display: block;
      background: linear-gradient(135deg, #fffbea, #eff6ff);
      border: 1px solid #fde68a;
    }

    .result.fail {
      display: block;
      background: linear-gradient(135deg, #fff1f2, #fff8e8);
      border: 1px solid #fecaca;
    }

    .result.unknown {
      display: block;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
    }

    .icon {
      font-size: 54px;
      margin-bottom: 12px;
    }

    .result h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #16213e;
    }

    .result p {
      color: #334155;
      line-height: 1.7;
      font-size: 16px;
    }

    .name {
      margin-top: 14px;
      font-size: 20px;
      font-weight: 800;
      color: #314c96;
    }

    .gform-button {
      background: linear-gradient(135deg, #314c96, #7aa7ff);
      color: white;
      margin-top: 16px;
    }

    .info-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
      text-align: center;
    }

    .form-card {
      margin-top: 24px;
      padding: 22px;
      border-radius: 22px;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
      text-align: left;
    }

    .form-card h3 {
      margin-bottom: 8px;
      font-size: 22px;
      color: #1f2a44;
      text-align: center;
    }

    .form-card .desc {
      text-align: center;
      color: #5b6b88;
      margin-bottom: 18px;
      font-size: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1f2a44;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    .note {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #ecfff3;
      border: 1px solid #a7f3d0;
      text-align: center;
    }

    .note.show {
      display: block;
    }

    .footer {
      margin-top: 28px;
      color: #6b7a96;
      font-size: 13px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 26px 20px;
      }

      .search-box {
        flex-direction: column;
      }

      button, .wa-button {
        width: 100%;
      }

      .logo {
        width: 96px;
      }
    }
  </style>
</head>
