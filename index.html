<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengumuman Staff Partner Physics Summit</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f7fbff, #eaf3ff, #dcecff);
      color: #1f2a44;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(49, 76, 150, 0.12);
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 20px 60px rgba(49, 76, 150, 0.12);
      text-align: center;
    }

    .logo {
      width: 120px;
      max-width: 100%;
      margin: 0 auto 16px;
      display: block;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #e8f0ff;
      color: #314c96;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(30px, 6vw, 56px);
      line-height: 1.05;
      margin-bottom: 14px;
      color: #16213e;
    }

    .subtitle {
      color: #4b5b7c;
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input, select {
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #c8d8f5;
      outline: none;
      font-size: 16px;
      background: white;
      color: #08111f;
    }

    input:focus, select:focus {
      border-color: #314c96;
      box-shadow: 0 0 0 4px rgba(49, 76, 150, 0.12);
    }

    .search-box input {
      flex: 1;
    }

    button, .wa-button {
      padding: 16px 22px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #ffcc70, #ff8177);
      color: #111827;
      font-weight: 800;
      font-size: 15px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }

    button:hover, .wa-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(255, 129, 119, 0.22);
    }

    .wa-button {
      background: linear-gradient(135deg, #25d366, #9cffb5);
      margin-top: 16px;
    }

    .result {
      display: none;
      margin-top: 24px;
      padding: 28px;
      border-radius: 24px;
      animation: fadeIn 0.35s ease;
      text-align: center;
    }

    .result.pass {
      display: block;
      background: linear-gradient(135deg, #ecfff3, #eef8ff);
      border: 1px solid #a7f3d0;
    }

    .result.fail {
      display: block;
      background: linear-gradient(135deg, #fff1f2, #fff8e8);
      border: 1px solid #fecaca;
    }

    .result.unknown {
      display: block;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
    }

    .icon {
      font-size: 54px;
      margin-bottom: 12px;
    }

    .result h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #16213e;
    }

    .result p {
      color: #334155;
      line-height: 1.7;
      font-size: 16px;
    }

    .name {
      margin-top: 14px;
      font-size: 20px;
      font-weight: 800;
      color: #314c96;
    }

    .form-card {
      margin-top: 24px;
      padding: 22px;
      border-radius: 22px;
      background: #f8fbff;
      border: 1px solid #dbe8ff;
      text-align: left;
    }

    .form-card h3 {
      margin-bottom: 8px;
      font-size: 22px;
      color: #1f2a44;
      text-align: center;
    }

    .form-card .desc {
      text-align: center;
      color: #5b6b88;
      margin-bottom: 18px;
      font-size: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1f2a44;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    .note {
      display: none;
      margin-top: 18px;
      padding: 18px;
      border-radius: 18px;
      background: #ecfff3;
      border: 1px solid #a7f3d0;
      text-align: center;
    }

    .note.show {
      display: block;
    }

    .footer {
      margin-top: 28px;
      color: #6b7a96;
      font-size: 13px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .container {
        padding: 26px 20px;
      }

      .search-box {
        flex-direction: column;
      }

      button, .wa-button {
        width: 100%;
      }

      .logo {
        width: 96px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- GANTI NAMA FILE LOGO DI SINI KALAU BEDA -->
    <img src="logo-physics-summit.png" alt="Logo Physics Summit" class="logo" />

    <div class="badge">Physics Summit</div>
    <h1>Pengumuman Staff Partner</h1>
    <p class="subtitle">
      Masukkan NRP kamu untuk melihat hasil seleksi Staff Partner Physics Summit.
    </p>

    <div class="search-box">
      <input id="nrpInput" type="text" placeholder="Contoh: 5023xxxxxx" />
      <button onclick="cekHasil()">Cek Hasil</button>
    </div>

    <section id="result" class="result"></section>

    <p class="footer">
      CP: Salwa | Physics Summit
    </p>
  </main>

  <script>
    // =====================================================
    // GANTI DATA DI SINI
    // Masukkan NRP peserta sesuai status masing-masing.
    // Format: "NRP": "Nama Peserta"
    // =====================================================

    const pesertaLolos = {
      "5023000001": "Nama Peserta 1",
      "5023000002": "Nama Peserta 2",
      "5023000003": "Nama Peserta 3"
    };

    const pesertaTidakLolosBerkas = {
      "5023000004": "Nama Peserta 4",
      "5023000005": "Nama Peserta 5"
    };

    const nomorCPSalwa = "6281362192288";

    function cekHasil() {
      const input = document.getElementById("nrpInput");
      const result = document.getElementById("result");
      const nrp = input.value.trim();

      if (!nrp) {
        result.className = "result unknown";
        result.innerHTML = `
          <div class="icon">🔎</div>
          <h2>NRP Belum Diisi</h2>
          <p>Silakan masukkan NRP kamu terlebih dahulu untuk melihat hasil seleksi.</p>
        `;
        return;
      }

      if (pesertaLolos[nrp]) {
        tampilkanLolos(nrp, pesertaLolos[nrp]);
      } else if (pesertaTidakLolosBerkas[nrp]) {
        result.className = "result fail";
        result.innerHTML = `
          <div class="icon">🙏</div>
          <h2>Terima Kasih Sudah Berpartisipasi</h2>
          <p>
            Mohon maaf, <b>NRP tersebut sudah tidak lolos dari seleksi berkas</b>
            Staff Partner Physics Summit.
          </p>
          <div class="name">${pesertaTidakLolosBerkas[nrp]}<br>${nrp}</div>
          <p style="margin-top: 16px;">
            Terima kasih atas antusiasme dan partisipasinya. Tetap semangat dan sampai bertemu di kesempatan berikutnya!
          </p>
          <a class="wa-button" href="https://wa.me/${nomorCPSalwa}" target="_blank">
            Hubungi CP Salwa
          </a>
        `;
      } else {
        result.className = "result unknown";
        result.innerHTML = `
          <div class="icon">⚠️</div>
          <h2>NRP Tidak Ditemukan</h2>
          <p>
            NRP yang kamu masukkan belum terdaftar dalam database pengumuman.
            Pastikan NRP sudah benar atau hubungi CP Salwa.
          </p>
          <a class="wa-button" href="https://wa.me/${nomorCPSalwa}" target="_blank">
            Hubungi CP Salwa
          </a>
        `;
      }
    }

    function tampilkanLolos(nrp, nama) {
      const result = document.getElementById("result");
      result.className = "result pass";
      result.innerHTML = `
        <div class="icon">🎉</div>
        <h2>Selamat, Kamu Lolos!</h2>
        <p>
          Selamat kepada kamu karena telah dinyatakan <b>LOLOS</b>
          sebagai Staff Partner Physics Summit.
        </p>
        <div class="name">${nama}<br>${nrp}</div>
        <p style="margin-top: 16px;">
          Sebelum masuk ke grup Staff Partner, silakan isi pendataan berikut terlebih dahulu.
          Setelah pendataan lengkap, informasi link grup akan menyusul dari panitia.
        </p>

        <a class="wa-button" href="https://wa.me/${nomorCPSalwa}" target="_blank">
          Hubungi CP Salwa
        </a>

        <div class="form-card">
          <h3>Pendataan Staff Partner</h3>
          <p class="desc">
            Pilih status pembayaran atau kategori kamu. Form ini wajib diisi sebelum masuk grup.
          </p>

          <div class="field">
            <label for="statusIkoma">Status IKOMA / KIPK</label>
            <select id="statusIkoma">
              <option value="">Pilih status</option>
              <option value="Sudah membayar IKOMA">Sudah membayar IKOMA</option>
              <option value="Belum membayar IKOMA">Belum membayar IKOMA</option>
              <option value="Anak KIPK">Anak KIPK</option>
            </select>
          </div>

          <button onclick="kirimPendataan('${nrp}', '${nama}')">Kirim Pendataan</button>

          <div id="note" class="note">
            <p>
              Pendataan berhasil dicatat di halaman ini. Silakan screenshot hasil pendataan kamu
              dan kirim ke CP Salwa melalui WhatsApp. Link grup akan menyusul dari panitia.
            </p>
          </div>
        </div>
      `;
    }

    function kirimPendataan(nrp, nama) {
      const status = document.getElementById("statusIkoma").value;
      const note = document.getElementById("note");

      if (!status) {
        alert("Silakan pilih status IKOMA / KIPK terlebih dahulu.");
        return;
      }

      note.classList.add("show");

      const pesan = encodeURIComponent(
        `Halo Kak Salwa, saya ingin konfirmasi pendataan Staff Partner Physics Summit.\n\nNama: ${nama}\nNRP: ${nrp}\nStatus: ${status}`
      );

      window.open(`https://wa.me/${nomorCPSalwa}?text=${pesan}`, "_blank");
    }

    document.getElementById("nrpInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        cekHasil();
      }
    });
  </script>
</body>
</html>
